# Deploy static site to Hostinger via FTPS (explicit TLS, port 21).
#
# Required secret (Settings → Secrets and variables → Actions):
#   HOSTINGER_FTP_PASSWORD — FTP password for user u828619841 (reset in hPanel if unknown)
#
# FTP target: IP 82.197.83.17 + user u828619841 (from hPanel).
#
# Remote folder: default is public_html/ relative to the FTP account root. If the job
# succeeds but File Manager shows no updates, your site root may differ — set a
# repository VARIABLE (Settings → Secrets and variables → Actions → Variables):
#   HOSTINGER_FTP_REMOTE_DIR
# Try one of (must end with /):
#   domains/speedtestboost.com/public_html/
#   ./
#   public_html/
#
# TLS: Hostinger's cert is for *.hstgr.io, not the raw IP. Connecting by IP requires
#       security: loose (otherwise ERR_TLS_CERT_ALTNAME_INVALID).
#       Optional: in hPanel → Files → FTP, copy the FTP *hostname* (e.g. xxx.hstgr.io),
#       replace `server:` below with that name, then you can try security: strict.

name: Deploy to Hostinger (FTP)

on:
  push:
    branches: [main, master]
    paths:
      - 'hostinger-static/**'
      - 'client/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check FTP password secret
        env:
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_PASS" ]; then
            echo "::error::Add repository secret HOSTINGER_FTP_PASSWORD (FTP password for u828619841 in Hostinger hPanel)."
            exit 1
          fi
          echo "✅ FTP password secret is set"

      - name: Prepare deployment files
        run: |
          if [ ! -f "hostinger-static/index.html" ]; then
            echo "::error::hostinger-static/index.html not found"
            exit 1
          fi
          ls -la hostinger-static/

      - name: Resolve FTP remote directory
        id: ftpdir
        env:
          OVERRIDE: ${{ vars.HOSTINGER_FTP_REMOTE_DIR }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            DIR="$OVERRIDE"
          else
            DIR="public_html/"
          fi
          case "$DIR" in */) ;; *) DIR="${DIR}/" ;; esac
          echo "Remote upload path (relative to FTP login root): $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: 82.197.83.17
          username: u828619841
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # loose: required when `server` is an IP (cert is issued for *.hstgr.io, not the IP).
          security: loose
          local-dir: ./hostinger-static/
          server-dir: ${{ steps.ftpdir.outputs.dir }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/*.log
            **/*.zip
            **/.DS_Store

      - name: Verify deployment
        run: |
          echo "Deployment completed."
          echo "Site: https://speedtestboost.com"
          echo "Timestamp: $(date)"

      - name: Test site response
        run: |
          sleep 30
          if curl -s --max-time 15 https://speedtestboost.com | grep -q "Speed Test"; then
            echo "Site is responding (smoke check OK)"
          else
            echo "Site may still be updating (smoke check inconclusive)"
          fi
