# Deploy production build to Hostinger via FTPS.
#
# Uploads Vite output dist/public/ (not the full repo). Copies .htaccess + api.php from hostinger-static/.
#
# Secret: HOSTINGER_FTP_PASSWORD (user u828619841)
# FTP: 82.197.83.17, FTPS, security loose.
#
# Default remote path matches File Manager:
#   …/files/domains/speedtestboost.com/public_html/
# (see https://srv1454-files.hstgr.io/.../files/domains/speedtestboost.com/public_html/)
# Override with repository variable HOSTINGER_FTP_REMOTE_DIR (must end with /).

name: Deploy to Hostinger (FTP)

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'shared/**'
      - 'hostinger-static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-hostinger-ftp.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check FTP password secret
        env:
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_PASS" ]; then
            echo "::error::Add repository secret HOSTINGER_FTP_PASSWORD (FTP password for u828619841 in Hostinger hPanel)."
            exit 1
          fi
          echo "✅ FTP password secret is set"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Stage Hostinger-only extras (Apache + PHP)
        run: |
          test -f dist/public/index.html
          if [ -f hostinger-static/.htaccess ]; then
            cp -f hostinger-static/.htaccess dist/public/
          fi
          if [ -f hostinger-static/api.php ]; then
            cp -f hostinger-static/api.php dist/public/
          fi
          echo "Deploy payload (file count):"
          find dist/public -type f | wc -l
          du -sh dist/public

      - name: Resolve FTP remote directory
        id: ftpdir
        env:
          OVERRIDE: ${{ vars.HOSTINGER_FTP_REMOTE_DIR }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            DIR="$OVERRIDE"
          else
            DIR="files/domains/speedtestboost.com/public_html/"
          fi
          case "$DIR" in */) ;; *) DIR="${DIR}/" ;; esac
          echo "Remote upload path (relative to FTP login root): $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: 82.197.83.17
          username: u828619841
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./dist/public/
          server-dir: ${{ steps.ftpdir.outputs.dir }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/*.log
            **/*.zip
            **/.DS_Store

      - name: Verify deployment
        run: |
          echo "Deployment completed."
          echo "Site: https://speedtestboost.com"
          echo "Timestamp: $(date)"

      - name: Test site response
        run: |
          sleep 30
          if curl -s --max-time 15 https://speedtestboost.com | grep -q "Speed Test"; then
            echo "Site is responding (smoke check OK)"
          else
            echo "Site may still be updating (smoke check inconclusive)"
          fi
