# Deploy production build over SSH/rsync (same payload as FTP workflow).
#
# Uploads dist/public/ after npm run build. Not the full Git repo.
#
# Secrets: HOSTINGER_SSH_KEY, HOSTINGER_HOST, HOSTINGER_SSH_USER
# Optional variable HOSTINGER_SSH_REMOTE_DIR — default matches:
#   ~/files/domains/speedtestboost.com/public_html/

name: Deploy to Hostinger (SSH)

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'shared/**'
      - 'hostinger-static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-to-hostinger-ssh.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SSH secrets
        env:
          KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          missing=0
          [ -z "$KEY" ] && { echo "::error::HOSTINGER_SSH_KEY is empty"; missing=1; }
          [ -z "$HOST" ] && { echo "::error::HOSTINGER_HOST is empty"; missing=1; }
          [ -z "$USER" ] && { echo "::error::HOSTINGER_SSH_USER is empty"; missing=1; }
          [ "$missing" -ne 0 ] && exit 1
          echo "✅ SSH secrets are set"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Stage Hostinger-only extras (Apache + PHP)
        run: |
          test -f dist/public/index.html
          if [ -f hostinger-static/.htaccess ]; then
            cp -f hostinger-static/.htaccess dist/public/
          fi
          if [ -f hostinger-static/api.php ]; then
            cp -f hostinger-static/api.php dist/public/
          fi
          find dist/public -type f | wc -l

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Resolve rsync destination
        id: dest
        env:
          OVERRIDE: ${{ vars.HOSTINGER_SSH_REMOTE_DIR }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            DIR="$OVERRIDE"
          else
            DIR="~/files/domains/speedtestboost.com/public_html/"
          fi
          echo "Rsync target suffix: $DIR"
          echo "path=$DIR" >> "$GITHUB_OUTPUT"

      - name: Add SSH host keys
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 30 -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "::error::ssh-keyscan failed for HOSTINGER_HOST"
            exit 1
          }

      - name: Deploy via rsync
        env:
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_PATH: ${{ steps.dest.outputs.path }}
        run: |
          set -e
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '*.log' \
            --exclude '*.zip' \
            ./dist/public/ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"

      - name: Verify deployment
        run: |
          echo "SSH deploy finished (dist/public/ → ~/files/domains/speedtestboost.com/public_html/)."
