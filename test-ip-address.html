<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Address Test</title>
</head>
<body>
    <h1>IP Address Test</h1>
    <p>Testing the IP address fetching functionality...</p>
    <div id="result">Loading...</div>

    <script>
        // Test network info fetching with ISP
        async function fetchNetworkInfo() {
            const services = [
                {
                    url: 'https://ipapi.co/json/',
                    parser: (data) => ({
                        ipAddress: data.ip,
                        isp: data.org || data.asn_org || 'Unknown ISP',
                        location: data.city && data.country_name ? `${data.city}, ${data.country_name}` : data.country_name || 'Unknown'
                    })
                },
                {
                    url: 'http://ip-api.com/json/',
                    parser: (data) => ({
                        ipAddress: data.query,
                        isp: data.isp || data.org || 'Unknown ISP',
                        location: data.city && data.country ? `${data.city}, ${data.country}` : data.country || 'Unknown'
                    })
                },
                {
                    url: 'https://api.my-ip.io/ip.json',
                    parser: (data) => ({
                        ipAddress: data.ip,
                        isp: data.org || 'Unknown ISP',
                        location: data.country || 'Unknown'
                    })
                }
            ];

            for (const service of services) {
                try {
                    console.log(`Trying ${service.url}...`);
                    const response = await fetch(service.url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        console.log(`Failed: ${response.url} - ${response.status} ${response.statusText}`);
                        continue;
                    }
                    
                    const data = await response.json();
                    console.log(`Response from ${service.url}:`, data);
                    
                    const parsed = service.parser(data);
                    console.log(`Parsed data:`, parsed);
                    
                    if (parsed.ipAddress) {
                        return parsed;
                    }
                    
                } catch (error) {
                    console.warn(`Failed to fetch from ${service.url}:`, error);
                    continue;
                }
            }
            
            return {
                ipAddress: 'Unable to detect',
                isp: 'Unknown ISP',
                location: 'Unknown'
            };
        }

        // Test the function
        fetchNetworkInfo().then(info => {
            document.getElementById('result').innerHTML = `
                <strong>IP Address:</strong> ${info.ipAddress}<br>
                <strong>ISP:</strong> ${info.isp}<br>
                <strong>Location:</strong> ${info.location}<br>
                <small>Check the browser console for detailed logs</small>
            `;
        }).catch(error => {
            document.getElementById('result').innerHTML = `
                <strong>Error:</strong> ${error.message}
            `;
        });
    </script>
</body>
</html>
